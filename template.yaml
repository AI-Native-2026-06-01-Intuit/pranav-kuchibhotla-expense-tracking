AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  W5D4 expense merchant lookup — HTTP API + Lambda (Java 21, arm64, SnapStart)
  backed by DynamoDB. Read-side only.

Parameters:
  StageName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stage
      - prod
    Description: Deployment stage (dev, stage, or prod).
  LogRetentionDays:
    Type: Number
    Default: 14
    Description: CloudWatch log retention for the Lambda log group.
  TraineeTag:
    Type: String
    Default: pranav-kuchibhotla
    Description: Value for the org-mandated 'trainee' tag (SCP-enforced).
  TeamTag:
    Type: String
    Default: team-67
    Description: Value for the org-mandated 'team' tag (SCP-enforced).
  EnvironmentTag:
    Type: String
    Default: training
    Description: Value for the org-mandated 'environment' tag (SCP-enforced).

Globals:
  Function:
    Runtime: java21
    Architectures:
      - arm64
    MemorySize: 1024
    Timeout: 10
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: WARN
    Environment:
      Variables:
        ENV: !Ref StageName

Resources:
  ExpenseHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Tags:
        trainee: !Ref TraineeTag
        team: !Ref TeamTag
        environment: !Ref EnvironmentTag

  MerchantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "merchants-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: trainee
          Value: !Ref TraineeTag
        - Key: team
          Value: !Ref TeamTag
        - Key: environment
          Value: !Ref EnvironmentTag

  MerchantLookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "expense-merchant-lookup-${StageName}"
      Handler: com.uptimecrew.expense_tracking.lambda.MerchantLookupHandler::handleRequest
      CodeUri: .
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Environment:
        Variables:
          MERCHANTS_TABLE: !Ref MerchantsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MerchantsTable
      Events:
        GetMerchant:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseHttpApi
            Method: GET
            Path: /merchants/{merchantId}
      Tags:
        trainee: !Ref TraineeTag
        team: !Ref TeamTag
        environment: !Ref EnvironmentTag

  MerchantLookupFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/expense-merchant-lookup-${StageName}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: trainee
          Value: !Ref TraineeTag
        - Key: team
          Value: !Ref TeamTag
        - Key: environment
          Value: !Ref EnvironmentTag

  MerchantLookupFunctionP99Alarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "expense-merchant-lookup-p99-${StageName}"
      AlarmDescription: >
        p99 duration for the merchant lookup Lambda over 5 consecutive
        1-minute windows. Threshold is 1500 ms.
      MetricName: Duration
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref MerchantLookupFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1500
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: trainee
          Value: !Ref TraineeTag
        - Key: team
          Value: !Ref TeamTag
        - Key: environment
          Value: !Ref EnvironmentTag

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API stage.
    Value: !Sub "https://${ExpenseHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
  FunctionName:
    Description: Lambda function name.
    Value: !Ref MerchantLookupFunction
  MerchantsTableName:
    Description: DynamoDB table name for merchants.
    Value: !Ref MerchantsTable
