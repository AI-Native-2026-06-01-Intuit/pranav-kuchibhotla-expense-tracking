spring:
  application:
    name: expense-service
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ${DB_PASSWORD:devpass}
    hikari:
      maximum-pool-size: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.uptimecrew.expense: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://placeholder:5432/test
    username: test
    password: test

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.uptimecrew.expense: INFO
