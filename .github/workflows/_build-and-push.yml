name: build-and-push (reusable)

on:
  workflow_call:
    inputs:
      image-tag:
        description: Primary image tag (typically the git SHA).
        required: true
        type: string
      also-tag-main:
        description: When true, additionally push the :main floating tag.
        required: false
        type: boolean
        default: false
      aws-region:
        description: AWS region hosting ECR.
        required: false
        type: string
        default: us-east-1
      ecr-repository:
        description: ECR repository name.
        required: false
        type: string
        default: uptimecrew/expense-api
      build-role-arn:
        description: OIDC role ARN with ECR push permissions.
        required: false
        type: string
        default: arn:aws:iam::726695008378:role/expense-api-build-push

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Build Spring Boot jar
        working-directory: expense-api
        run: ./gradlew --no-daemon --stacktrace bootJar -x test

      - name: Setup Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build image (load to local docker)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: expense-api
          file: expense-api/Dockerfile
          load: true
          push: false
          tags: expense-api:${{ inputs.image-tag }}

      - name: Trivy scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: expense-api:${{ inputs.image-tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ inputs.build-role-arn }}
          role-session-name: gha-build-push-${{ github.run_id }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

      - name: Push image (SHA tag)
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ inputs.ecr-repository }}
          SHA_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          SRC="expense-api:${SHA_TAG}"
          DST_SHA="${REGISTRY}/${REPO}:${SHA_TAG}"
          docker tag "${SRC}" "${DST_SHA}"
          docker push "${DST_SHA}"

      - name: Push image (main floating tag)
        if: inputs.also-tag-main
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ inputs.ecr-repository }}
          SHA_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          SRC="expense-api:${SHA_TAG}"
          DST_MAIN="${REGISTRY}/${REPO}:main"
          docker tag "${SRC}" "${DST_MAIN}"
          docker push "${DST_MAIN}"
