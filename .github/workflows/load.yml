# W6D5 load-gate workflow.
#
# The cohort brief assumed a shared EKS endpoint would exist to point k6
# at; it does not. So this workflow is split:
#
#   * static job — always runs on PR. Greps the k6 script for the exact
#     SLO thresholds and workload metadata. If the script is edited to
#     loosen any threshold or drop the cost gate, this job fails.
#   * live job — only runs on manual dispatch when a target_url is
#     provided AND run_live_load=true. This prevents the workflow from
#     failing every PR just because no cluster exists.
name: load

on:
  pull_request:
    paths:
      - "expense-api/loadtests/**"
      - ".github/workflows/load.yml"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL for the live k6 run (e.g. https://expense-api-dev.example.com). Leave blank to skip live run."
        required: false
        default: ""
      run_live_load:
        description: "Set to true to execute k6 against target_url."
        required: false
        default: "false"

jobs:
  static-thresholds:
    name: Static SLO threshold check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: p99 latency threshold present
        run: |
          grep -F "'p(99)<600'" expense-api/loadtests/expense-api-p99.js

      - name: error rate threshold present
        run: |
          grep -F "'rate<0.01'" expense-api/loadtests/expense-api-p99.js

      - name: cost gate threshold present
        run: |
          grep -F "'p(95)<0.004'" expense-api/loadtests/expense-api-p99.js

      - name: workload mix weights present (0.7 / 0.2 / 0.1)
        run: |
          grep -F 'weight: 0.7' expense-api/loadtests/expense-api-p99.js
          grep -F 'weight: 0.2' expense-api/loadtests/expense-api-p99.js
          grep -F 'weight: 0.1' expense-api/loadtests/expense-api-p99.js

      - name: reject silently renormalized weights
        run: |
          # If someone changes 0.7/0.2/0.1 into e.g. 60/20/20 and then adds
          # a normalize() call, the earlier greps still pass. So also
          # enforce the assertion function stays in the file.
          grep -F 'assertMixWeightsSumToOne' expense-api/loadtests/expense-api-p99.js

      - name: synthetic tenant only
        run: |
          grep -F 'tenant-synth' expense-api/loadtests/expense-api-p99.js
          # Reject any obviously-real tenant patterns.
          ! grep -RIn 'tenant-prod\|tenant-real\|tenant-live' expense-api/loadtests || {
            echo "Real tenant IDs are not permitted in loadtests/" >&2
            exit 1
          }

      - name: no secrets in loadtests
        run: |
          ! grep -RIn 'sk-\|LLM_API_KEY=' expense-api/loadtests || {
            echo "Loadtests must not carry API keys" >&2
            exit 1
          }

  live:
    name: k6 live run
    runs-on: ubuntu-latest
    needs: static-thresholds
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.run_live_load == 'true' &&
      inputs.target_url != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6
        env:
          TARGET: ${{ inputs.target_url }}
        run: |
          k6 run --summary-export=k6-summary.json expense-api/loadtests/expense-api-p99.js

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: k6-summary.json
