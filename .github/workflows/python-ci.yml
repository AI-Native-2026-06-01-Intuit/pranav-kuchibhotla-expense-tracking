name: expense-ai-ci

on:
  push:
    branches: [main]
    paths:
      - "expense-ai/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "expense-ai/**"
      - ".github/workflows/python-ci.yml"

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: expense-ai
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Set up uv
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4
        with:
          version: "0.4.18"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy strict
        run: uv run mypy --strict src/ tests/

      - name: Pytest with coverage
        run: uv run pytest -v --cov=src --cov-fail-under=85

      - name: Great Expectations + pgvector Testcontainers gate
        run: |
          uv run pytest -v \
            tests/test_great_expectations_suite.py \
            tests/test_pgvector_loader.py

      - name: RAGAS golden-set thresholds
        env:
          EXPENSE_AI_ANTHROPIC_API_KEY: ${{ secrets.EXPENSE_AI_ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.EXPENSE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: expense-ai-dev-ci
          EXPENSE_AI_ALLOW_EXTERNAL_SKIP: "1"
        run: uv run pytest -v tests/test_ragas_thresholds.py

      - name: LangSmith run visibility
        env:
          LANGSMITH_API_KEY: ${{ secrets.EXPENSE_AI_LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: expense-ai-dev-ci
          EXPENSE_AI_PG_DSN: ${{ secrets.EXPENSE_AI_PG_DSN }}
          EXPENSE_AI_ALLOW_EXTERNAL_SKIP: "1"
        run: uv run python -m expense_ai.scripts.assert_langsmith_run_visible
