name: expense-api docker

on:
  pull_request:
    paths:
      - 'expense-api/**'
      - '.github/workflows/docker.yml'
  push:
    branches:
      - main
    paths:
      - 'expense-api/**'
      - '.github/workflows/docker.yml'

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint (fail on warning)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: expense-api/Dockerfile
          config: expense-api/.hadolint.yaml
          failure-threshold: warning

  build-scan-smoke:
    name: build + scan + smoke
    needs: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load into local daemon; no push)
        uses: docker/build-push-action@v6
        with:
          context: ./expense-api
          load: true
          tags: uptimecrew/expense-api:ci-${{ github.run_id }}
          build-args: |
            APP_VERSION=ci-${{ github.run_id }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (HIGH/CRITICAL, fixed-only, waivers apply)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: uptimecrew/expense-api:ci-${{ github.run_id }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: expense-api/.trivyignore
          vuln-type: os,library

      - name: Smoke — image contract (User=65532 + healthcheck present)
        run: |
          set -euo pipefail
          image="uptimecrew/expense-api:ci-${{ github.run_id }}"
          user="$(docker inspect --format '{{.Config.User}}' "$image")"
          echo "Config.User=$user"
          test "$user" = "65532"
          hc="$(docker inspect --format '{{json .Config.Healthcheck.Test}}' "$image")"
          echo "Config.Healthcheck.Test=$hc"
          echo "$hc" | grep -q '/home/nonroot/healthcheck'

      # Bounded reachability probe against the actuator readiness endpoint.
      # This is deliberately a REACHABILITY probe, not a readiness-UP probe:
      # the app requires Postgres/Mongo/Redis/Kafka plus the W2D1 schema to
      # answer 200/UP, and wiring those in here would duplicate W5D2 Compose.
      # Any HTTP response (including 4xx/5xx) counts as pass — it proves the
      # container launched, the JVM is up, and Tomcat is serving /actuator.
      # Full 200/UP smoke lands in W5D2 under Compose. See
      # expense-api/docker/SECURITY.md ("Readiness smoke scope").
      - name: Smoke — bounded readiness reachability probe
        run: |
          image="uptimecrew/expense-api:ci-${{ github.run_id }}"
          endpoint="http://127.0.0.1:8080/actuator/health/readiness"
          attempts=10
          delay=3

          # NB: no --rm on docker run. If the container exits early (which is
          # the current pre-Compose reality — no Postgres → Hibernate crashes
          # before Tomcat binds) --rm would strip the container out from under
          # us and the failure-branch `docker logs` would print "no such
          # container" with zero diagnostic value. We remove it explicitly at
          # the end of the step (and on failure) instead.
          docker run -d --name expense-api-smoke -p 8080:8080 "$image" >/dev/null

          reachable=0
          for i in $(seq 1 "$attempts"); do
            http_code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 "$endpoint" || true)"
            http_code="${http_code:-000}"
            echo "attempt $i/$attempts: $endpoint -> HTTP $http_code"
            # 000 = no HTTP response (connection refused / timeout / dropped).
            # Anything else, including 4xx/5xx, proves the endpoint is
            # reachable; readiness-UP is not required until W5D2 Compose.
            if [ "$http_code" != "000" ]; then
              reachable=1
              break
            fi
            sleep "$delay"
          done

          if [ "$reachable" -eq 0 ]; then
            echo "::error::readiness endpoint unreachable after ${attempts} attempts (~$((attempts * delay))s)"
            docker logs expense-api-smoke 2>&1 | tail -120 || true
            docker rm -f expense-api-smoke >/dev/null 2>&1 || true
            exit 1
          fi

          docker logs expense-api-smoke 2>&1 | tail -40 || true
          docker rm -f expense-api-smoke >/dev/null 2>&1 || true
