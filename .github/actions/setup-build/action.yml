name: setup-build
description: Install Temurin JDK 21 and configure Gradle build caching for expense-api. Callers must run actions/checkout before invoking this composite.
inputs:
  java-version:
    description: Temurin major version to install.
    required: false
    default: "21"
runs:
  using: composite
  steps:
    - name: Setup Temurin JDK
      uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0bdd871935719febd78681f197cd39af5b6e16a6 # v4.2.2
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}
