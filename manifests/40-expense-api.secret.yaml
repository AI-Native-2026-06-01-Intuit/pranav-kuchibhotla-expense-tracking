# Placeholder Secret — checked in ONLY so the manifest set is complete and
# `kubectl apply -f manifests/` doesn't fail on the initial rollout. The
# stringData value is deliberately a non-usable sentinel: it is overwritten
# before rollout by `kubectl create secret ... --dry-run=client -o yaml |
# kubectl apply -f -` in scripts/k8s-up.sh (locally) and in the k8s-ci
# workflow (from CI_PG_PASSWORD or a documented fallback). Any real password
# lives outside git.
apiVersion: v1
kind: Secret
metadata:
  name: expense-api-secrets
  namespace: expense-dev
  labels:
    app.kubernetes.io/name: expense-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: expense
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # Never commit a real secret. The sentinel below is intentionally
  # non-usable so a `kubectl apply` without the override step produces a
  # visible auth failure rather than silently going live with a weak default.
  SPRING_DATASOURCE_PASSWORD: "replace-at-apply-time-from-secrets-manager"
