apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: expense-dev
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: readmodel
    app.kubernetes.io/part-of: expense
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: expense-dev
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: readmodel
    app.kubernetes.io/part-of: expense
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo
        app.kubernetes.io/component: readmodel
        app.kubernetes.io/part-of: expense
        app.kubernetes.io/managed-by: kubectl
    spec:
      containers:
        - name: mongo
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand({ ping: 1 }).ok"
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: mongo
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          emptyDir: {}
