apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-agent-svc
  labels:
    app.kubernetes.io/name: expense-agent-svc
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: expense
    app.kubernetes.io/managed-by: argocd
spec:
  # Overlay replicas: dev=1, staging=2, prod=3 (set per-overlay).
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: expense-agent-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: expense-agent-svc
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: expense
        app.kubernetes.io/managed-by: argocd
    spec:
      # Pod-level security context matches the runAsUser used by the
      # sibling expense-api Deployment (distroless-nonroot uid).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # 60s grace so an in-flight /v1/chat/stream response can finish
      # writing its channel-2 frame before shutdown; the SSE bridge
      # cooperates with request.is_disconnected on the FastAPI side.
      terminationGracePeriodSeconds: 60
      containers:
        - name: expense-agent-svc
          # Image tag is rewritten per-overlay by
          # `kustomize edit set image`; the merge workflow pins the tag
          # to each pushed git SHA. The float below is intentional — a
          # kustomize baseline value that overlays MUST replace before
          # applying. `kubectl kustomize` blocks a floating `:latest`
          # here because base.yaml only carries the digest-shaped
          # placeholder below.
          image: 726695008378.dkr.ecr.us-east-1.amazonaws.com/expense-agent-svc:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: expense-agent-svc-config
            - secretRef:
                name: expense-agent-svc-secrets
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Python + uv occasionally need a writable tmpfs at runtime
            # (compile cache warm-up); mounting an emptyDir keeps the
            # rest of the filesystem read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
