apiVersion: v1
kind: Secret
metadata:
  name: expense-agent-svc-secrets
  labels:
    app.kubernetes.io/name: expense-agent-svc
    app.kubernetes.io/part-of: expense
    app.kubernetes.io/managed-by: argocd
  # This Secret is a *placeholder shape* only. Real values are seeded
  # out of band (see the ignoreDifferences block in the Argo Application
  # for the sibling expense-api service — the same pattern applies
  # here: /data and /stringData are excluded from self-heal so a
  # kubectl-seeded value is not clobbered on every reconcile).
type: Opaque
stringData:
  # DSN for the LangGraph PostgresSaver checkpointer.
  EXPENSE_AGENT_POSTGRES_URL: ""
  # DSN for the W7D3 pgvector store (not the checkpointer DB).
  EXPENSE_AGENT_RAG_POSTGRES_URL: ""
  # Redis connection string for the W7D3 semantic cache.
  EXPENSE_AGENT_REDIS_URL: ""
  # SSE URL published by expense-mcp-server.
  EXPENSE_AGENT_MCP_SSE_URL: ""
  # Signed bearer JWT accepted by the W7D4 SSE middleware.
  # Startup fails-closed when this is empty (see runtime._require_mcp_configuration).
  EXPENSE_AGENT_MCP_BEARER_JWT: ""
  # Anthropic API key (or an equivalent llm-proxy token).
  EXPENSE_AGENT_ANTHROPIC_API_KEY: ""
  # Optional LangSmith key for tracing / RAGAS metadata writes.
  EXPENSE_AGENT_LANGSMITH_API_KEY: ""
