apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: expense

resources:
  # Namespace is omitted intentionally — the Argo Application uses
  # syncOption CreateNamespace=true and the AppProject in the config
  # repo enforces the destination namespace whitelist.
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
